kind = "web"
previewPath = "/"
title = "Scholix"
version = "1.0.0"
id = "artifacts/scholix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22255

[services.development]
run = "pnpm --filter @workspace/scholix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scholix", "run", "build" ]
publicDir = "artifacts/scholix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22255"
BASE_PATH = "/"
